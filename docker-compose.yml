version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: notes_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 6185
      POSTGRES_DB: notes_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: notes_keycloak
    restart: always
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/notes_db
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: 6185
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_FEATURES: preview
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./notes/keycloak_realm.json:/opt/keycloak/data/import/realm.json
    command: start-dev --import-realm

  mailhog:
    image: mailhog/mailhog:latest
    container_name: notes_mailhog
    restart: always
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MH_STORAGE: maildir
      MH_MAILDIR_PATH: /maildir
    volumes:
      - mailhog_data:/maildir

  app:
    build: ./notes
    container_name: notes_app
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:6185@postgres:5432/notes_db
      SECRET_KEY: your-secret-key-here-change-in-production
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: notes-realm
      KEYCLOAK_CLIENT_ID: notes-client
      KEYCLOAK_CLIENT_SECRET: c5ycHw7G18oZdSxpD8Pxk5JUMEkAmVMx
      MAILHOG_HOST: mailhog
      MAILHOG_PORT: 1025
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      mailhog:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: notes_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - app

volumes:
  postgres_data:
  mailhog_data: